<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打开固定网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 15px;
        }
        
        p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button, a {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .btn-primary {
            background: #1677ff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0d47a1;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #d9d9d9;
        }
        
        .btn-secondary:hover {
            background: #e6e6e6;
        }
        
        .info-text {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔗</div>
        <h1>打开固定网站</h1>
        <p>安全模式已启用，正在打开目标网站登录页面...（如果浏览器阻止弹窗，请手动点击下方按钮）</p>
        
        <div class="button-group">
            <a href="{{ target_url }}" target="_blank" class="btn-primary">打开目标网站</a>
            <a href="{{ url_for('user_settings') }}" class="btn-secondary">返回设置</a>
        </div>
        
        <p class="info-text">登录后，返回本页面，点击"首页"按钮即可使用保存的会话</p>
    </div>
    
    <script>
        // 自动打开目标网站
        window.open('{{ target_url }}', '_blank');
        
        // 3秒后返回用户设置页面
        setTimeout(function() {
            window.location.href = '{{ url_for("user_settings") }}';
        }, 3000);
    </script>
</body>
</html>
