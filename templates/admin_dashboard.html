<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员面板 - 请假系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px 20px;
        }
        
        .user-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .user-info p {
            color: #666;
            margin-bottom: 8px;
        }
        
        .user-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .admin-badge {
            display: inline-block;
            padding: 3px 8px;
            background: #f5576c;
            color: white;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .menu {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px 15px;
            background: #f9f9f9;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
        }
        
        .menu-item:hover {
            background: #f0f0f0;
            border-color: #f5576c;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.1);
        }
        
        .menu-item .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .menu-item .label {
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }
        
        .menu-item .sublabel {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .footer {
            padding: 20px;
            background: #f5f5f5;
            text-align: center;
            border-top: 1px solid #e8e8e8;
        }
        
        .logout-btn {
            display: inline-block;
            padding: 8px 20px;
            background: #666;
            color: white;
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            transition: background 0.3s ease;
        }
        
        .logout-btn:hover {
            background: #333;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e8e8e8;
        }
        
        .stat-item {
            text-align: center;
            padding: 10px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #f5576c;
        }
        
        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>⚙️ 管理员控制台</h1>
                <p>审批管理中心</p>
            </div>
            
            <div class="content">
                <div class="user-info">
                    <p>管理员身份登录</p>
                    <p class="user-name">
                        {{ current_user.name }}
                        <span class="admin-badge">管理员</span>
                    </p>
                </div>
                
                <div class="menu">
                    <a href="/approve_list" class="menu-item">
                        <div class="icon">✅</div>
                        <div class="label">请假审批</div>
                        <div class="sublabel">管理所有请假申请</div>
                    </a>
                    
                    <a href="/admin/users" class="menu-item">
                        <div class="icon">👥</div>
                        <div class="label">用户管理</div>
                        <div class="sublabel">查看、锁定、删除用户</div>
                    </a>
                    
                        <a href="/admin/registration_keys" class="menu-item">
                            <div class="icon">🔐</div>
                            <div class="label">秘钥管理</div>
                            <div class="sublabel">生成注册秘钥</div>
                        </a>
                </div>
                
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value">-</div>
                        <div class="stat-label">待审核</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">-</div>
                        <div class="stat-label">已处理</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">-</div>
                        <div class="stat-label">总计</div>
                    </div>
                </div>
            </div>
            
            <div class="footer">
                <a href="/logout" class="logout-btn">登出</a>
            </div>
        </div>
    </div>
</body>
</html>
