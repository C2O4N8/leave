<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户设置 - 请假系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-icon {
            font-size: 28px;
        }
        
        .header h1 {
            font-size: 24px;
            margin: 0;
        }
        
        .back-button {
            position: absolute;
            left: 20px;
            top: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-button:hover {
            background: rgba(255, 255, 255, 0.5);
        }
        
        .content {
            padding: 30px 20px;
        }
        
        .settings-group {
            margin-bottom: 30px;
        }
        
        .settings-group h2 {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }
        
        .setting-item:hover {
            background: #f5f5f5;
        }
        
        .setting-label {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .setting-name {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .setting-description {
            font-size: 12px;
            color: #999;
        }
        
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #ccc;
            border-radius: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            padding: 0;
        }
        
        .toggle-switch.active {
            background: #52c41a;
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s ease;
        }
        
        .toggle-switch.active::after {
            left: 26px;
        }
        
        .info-box {
            background: #e6f7ff;
            border-left: 4px solid #1890ff;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 13px;
            color: #0050b3;
            line-height: 1.6;
        }
        
        .info-box strong {
            display: block;
            margin-bottom: 8px;
            color: #1890ff;
        }
        
        .warning-box {
            background: #fff7e6;
            border-left: 4px solid #faad14;
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
            font-size: 13px;
            color: #ad6800;
            line-height: 1.6;
        }
        
        .warning-box strong {
            display: block;
            margin-bottom: 8px;
            color: #faad14;
        }
        
        .url-input-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        
        .url-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
            font-family: monospace;
        }
        
        .url-input:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }
        
        .save-button {
            background: #1890ff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        
        .save-button:hover {
            background: #0050b3;
        }
        
        .save-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .success-message {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #274240;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
        
        .footer {
            background: #f5f5f5;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #e8e8e8;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="header-icon">⚙️</div>
                <h1>用户设置</h1>
            </div>
            
            <div class="content">
                <!-- 成功提示 -->
                <div id="successMessage" class="success-message">
                    ✓ 设置已保存成功
                </div>
                
                <!-- 安全设置组 -->
                <div class="settings-group">
                    <h2>🔒 安全设置</h2>
                    
                    <div class="setting-item">
                        <div class="setting-label">
                            <div class="setting-name">安全模式</div>
                            <div class="setting-description">启用后，通过代理访问固定网站并使用保存的会话</div>
                        </div>
                        <button class="toggle-switch" id="safetyModeToggle" onclick="toggleSafetyMode()"></button>
                    </div>
                    
                    <div id="safeModeActions" style="display: none;">
                        <div class="setting-item" style="flex-direction: column; align-items: flex-start; gap:10px;">
                            <div class="setting-label" style="width: 100%;">
                                <div class="setting-name">固定网站</div>
                                <div class="setting-description">https://lyxgqj.gdppla.edu.cn/ydxg</div>
                            </div>
                            <div>
                                <a href="/safe_mode/start" style="display:inline-block; padding:8px 14px; background:#1677ff; color:#fff; border-radius:4px; text-decoration:none;">前往登录固定网站（保存会话）</a>
                            </div>
                        </div>
                    </div>
                    
                    <div class="info-box">
                        <strong>💡 安全模式说明：</strong>
                        开启后，系统将通过内置代理访问固定网站，并保存您的登录会话（Cookie/Session）。会话具有时间期限，过期后将无法正常使用安全模式，请重新登录。
                    </div>
                    
                </div>
                
                <!-- 返回按钮 -->
                <div style="text-align: center; margin-top: 30px;">
                    <a href="/user_dashboard" style="display: inline-block; padding: 10px 20px; background: #f0f0f0; color: #333; border-radius: 4px; text-decoration: none; transition: all 0.3s ease;" onmouseover="this.style.background='#e0e0e0'" onmouseout="this.style.background='#f0f0f0'">
                        ← 返回面板
                    </a>
                </div>
            </div>
            
            <div class="footer">
                本设置信息存储在您的会话中
            </div>
        </div>
    </div>
    
    <script>
        // 初始化安全模式状态
        function initSafetyMode() {
            fetch('/api/settings/get_safety_mode')
                .then(response => response.json())
                .then(data => {
                    const toggle = document.getElementById('safetyModeToggle');
                    const actionBox = document.getElementById('safeModeActions');
                    
                    if (data.safety_mode_enabled) {
                        toggle.classList.add('active');
                        actionBox.style.display = 'block';
                    } else {
                        toggle.classList.remove('active');
                        actionBox.style.display = 'none';
                    }
                })
                .catch(error => console.error('获取设置失败:', error));
        }
        
        // 切换安全模式
        function toggleSafetyMode() {
            const toggle = document.getElementById('safetyModeToggle');
            const actionBox = document.getElementById('safeModeActions');
            const isEnabled = !toggle.classList.contains('active');
            
            fetch('/api/settings/set_safety_mode', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    enabled: isEnabled
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    if (isEnabled) {
                        toggle.classList.add('active');
                        actionBox.style.display = 'block';
                    } else {
                        toggle.classList.remove('active');
                        actionBox.style.display = 'none';
                    }
                    showSuccessMessage();
                }
            })
            .catch(error => {
                console.error('更新设置失败:', error);
                alert('更新设置失败，请重试');
            });
        }
        
        // 已移除自定义URL设置，安全模式使用固定站点与代理
        
        // 显示成功提示
        function showSuccessMessage() {
            const msg = document.getElementById('successMessage');
            msg.classList.add('show');
            setTimeout(() => {
                msg.classList.remove('show');
            }, 3000);
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initSafetyMode();
        });
    </script>
</body>
</html>
