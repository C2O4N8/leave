<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1">
    <title>注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto'; 
            background: linear-gradient(135deg, #1890ff 0%, #52c41a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 360px;
            padding: 32px;
        }
        .register-title { 
            text-align: center; 
            font-size: 24px; 
            font-weight: 600; 
            color: #333;
            margin-bottom: 12px;
        }
        .register-subtitle {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-bottom: 28px;
        }
        .form-item {
            margin-bottom: 16px;
        }
        .form-item label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-item input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        .form-item input:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
        }
        .form-item input::placeholder {
            color: #bfbfbf;
        }
        .error {
            background: #fff1f0;
            color: #ff4d4f;
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 16px;
            border: 1px solid #ffccc7;
        }
        .register-button {
            width: 100%;
            padding: 10px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
        }
        .register-button:hover {
            background: #0050b3;
            box-shadow: 0 4px 12px rgba(24, 144, 255, 0.3);
        }
        .register-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #999;
        }
        .register-footer a {
            color: #1890ff;
            text-decoration: none;
            margin: 0 4px;
        }
        .register-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-title">学生请假系统</div>
        <div class="register-subtitle">创建新账户</div>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-item">
                <label>用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-item">
                <label>姓名</label>
                <input type="text" name="name" placeholder="请输入您的姓名" required>
            </div>
            <div class="form-item">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码（至少6位）" required>
            </div>
            <button type="submit" class="register-button">注 册</button>
        </form>
        
        <div class="register-footer">
            已有账户？<a href="{{ url_for('login') }}">去登录</a>
        </div>
    </div>
</body>
</html>
